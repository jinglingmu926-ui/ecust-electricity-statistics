<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>四舍215电量看板</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      background: #f2f5fa;
      color: #172033;
      font-family: system-ui, -apple-system, "Microsoft YaHei", sans-serif;
    }

    main {
      max-width: 1100px;
      margin: auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .subtitle, .note {
      color: #64748b;
      font-size: 14px;
    }

    .status {
      padding: 7px 12px;
      border-radius: 999px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-good {
      color: #166534;
      background: #dcfce7;
    }

    .status-warning {
      color: #92400e;
      background: #fef3c7;
    }

    .status-danger {
      color: #991b1b;
      background: #fee2e2;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .card, .panel {
      padding: 18px;
      background: white;
      border: 1px solid #e4eaf2;
      border-radius: 14px;
      box-shadow: 0 5px 18px rgba(15, 23, 42, 0.05);
    }

    .card-label {
      display: block;
      margin-bottom: 8px;
      color: #64748b;
      font-size: 14px;
    }

    .card-value {
      font-size: 25px;
      font-weight: 750;
    }

    .green { color: #15803d; }
    .orange { color: #d97706; }
    .red { color: #dc2626; }

    .panel {
      margin-bottom: 18px;
    }

    .panel h2 {
      margin: 0 0 6px;
      font-size: 19px;
    }

    .chart {
      height: 360px;
    }

    .weekday-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      margin: 14px 0 4px;
      font-size: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid #e9edf3;
      text-align: left;
    }

    th {
      color: #475569;
      font-size: 13px;
    }

    td {
      font-size: 14px;
    }

    @media (max-width: 780px) {
      body { padding: 14px; }

      header {
        display: block;
      }

      .status {
        display: inline-block;
        margin-top: 12px;
      }

      .cards {
        grid-template-columns: repeat(2, 1fr);
      }

      .chart {
        height: 310px;
      }

      .table-wrap {
        overflow-x: auto;
      }
    }

    @media (max-width: 480px) {
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main>
    <header>
      <div>
        <h1>华理徐汇四舍 215 电量看板</h1>
        <div class="subtitle">
          每天 09:12—21:12，每 3 小时自动查询
        </div>
      </div>
      <div id="status" class="status">读取中</div>
    </header>

    <section class="cards">
      <div class="card">
        <span class="card-label">当前剩余电量</span>
        <strong id="remaining" class="card-value">--</strong>
      </div>

      <div class="card">
        <span class="card-label">较上次查询用电</span>
        <strong id="last-usage" class="card-value">--</strong>
      </div>

      <div class="card">
        <span class="card-label">今天累计用电</span>
        <strong id="today-usage" class="card-value">--</strong>
      </div>

      <div class="card">
        <span class="card-label">最近查询时间</span>
        <strong id="updated" class="card-value">--</strong>
      </div>
    </section>

    <section class="panel">
      <h2>本周各时段剩余电量</h2>
      <div class="note">
        横轴为一天中的时间。不同颜色代表星期，可直接比较每天相同时段的电量变化。
      </div>

      <div class="weekday-legend">
        <span class="legend-item"><i class="legend-dot" style="background:#e53935"></i>周一</span>
        <span class="legend-item"><i class="legend-dot" style="background:#fb8c00"></i>周二</span>
        <span class="legend-item"><i class="legend-dot" style="background:#fbc02d"></i>周三</span>
        <span class="legend-item"><i class="legend-dot" style="background:#43a047"></i>周四</span>
        <span class="legend-item"><i class="legend-dot" style="background:#00acc1"></i>周五</span>
        <span class="legend-item"><i class="legend-dot" style="background:#1e88e5"></i>周六</span>
        <span class="legend-item"><i class="legend-dot" style="background:#8e24aa"></i>周日</span>
      </div>

      <div id="week-chart" class="chart"></div>
    </section>

    <section class="panel">
      <h2>最近查询记录</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>查询时间</th>
              <th>剩余电量</th>
              <th>较上次用电</th>
              <th>状态</th>
            </tr>
          </thead>
          <tbody id="records-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/@antv/g2plot@2.4.35/dist/g2plot.min.js"></script>
  <script src="./data.js"></script>

  <script>
    const weekdayNames = [
      "周一", "周二", "周三", "周四", "周五", "周六", "周日"
    ];

    const weekdayColors = [
      "#e53935",
      "#fb8c00",
      "#fbc02d",
      "#43a047",
      "#00acc1",
      "#1e88e5",
      "#8e24aa"
    ];

    function parseTime(value) {
      const normalized = value.includes(" ")
        ? value.replace(" ", "T") + ":00"
        : value + "T00:00:00";

      return new Date(normalized);
    }

    function round(value) {
      return Math.round(value * 100) / 100;
    }

    function dateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function weekdayIndex(date) {
      return (date.getDay() + 6) % 7;
    }

    function startOfWeek(date) {
      const result = new Date(date);
      result.setHours(0, 0, 0, 0);
      result.setDate(result.getDate() - weekdayIndex(result));
      return result;
    }

    const records = (Array.isArray(data) ? data : [])
      .map(item => ({
        rawTime: item.time,
        date: parseTime(item.time),
        remaining: Number(item.kWh)
      }))
      .filter(item =>
        !Number.isNaN(item.date.getTime()) &&
        Number.isFinite(item.remaining)
      )
      .sort((a, b) => a.date - b.date);

    records.forEach((item, index) => {
      if (index === 0) {
        item.usage = null;
      } else {
        item.usage = round(
          records[index - 1].remaining - item.remaining
        );
      }
    });

    if (records.length === 0) {
      document.getElementById("status").textContent = "暂无数据";
      document.getElementById("status").className =
        "status status-warning";

      document.getElementById("week-chart").innerHTML =
        "<p class='note'>自动任务成功记录数据后，图表会显示在这里。</p>";
    } else {
      const latest = records[records.length - 1];

      document.getElementById("remaining").textContent =
        `${latest.remaining} 度`;

      document.getElementById("updated").textContent =
        latest.rawTime;

      if (latest.usage === null) {
        document.getElementById("last-usage").textContent =
          "等待下次查询";
      } else if (latest.usage < 0) {
        document.getElementById("last-usage").textContent =
          "疑似充值";
        document.getElementById("last-usage").classList.add("orange");
      } else {
        document.getElementById("last-usage").textContent =
          `${latest.usage} 度`;
      }

      const latestDateKey = dateKey(latest.date);
      const todayRecords = records.filter(
        item => dateKey(item.date) === latestDateKey
      );

      let todayUsage = 0;
      let rechargeToday = false;

      for (let index = 1; index < todayRecords.length; index++) {
        const difference = round(
          todayRecords[index - 1].remaining -
          todayRecords[index].remaining
        );

        if (difference >= 0) {
          todayUsage += difference;
        } else {
          rechargeToday = true;
        }
      }

      document.getElementById("today-usage").textContent =
        todayRecords.length < 2
          ? "等待更多数据"
          : `${round(todayUsage)} 度`;

      if (rechargeToday) {
        document.getElementById("today-usage").title =
          "今天检测到疑似充值，累计值仅包含正常下降区间";
      }

      const statusElement = document.getElementById("status");
      const remainingElement = document.getElementById("remaining");

      if (latest.remaining < 10) {
        statusElement.textContent = "电量告急";
        statusElement.className = "status status-danger";
        remainingElement.classList.add("red");
      } else if (latest.remaining < 20) {
        statusElement.textContent = "建议尽快充值";
        statusElement.className = "status status-warning";
        remainingElement.classList.add("orange");
      } else {
        statusElement.textContent = "电量充足";
        statusElement.className = "status status-good";
        remainingElement.classList.add("green");
      }

      const weekStart = startOfWeek(latest.date);
      const weekEnd = new Date(weekStart);
      weekEnd.setDate(weekEnd.getDate() + 7);

      const weekData = records
        .filter(item =>
          item.rawTime.includes(" ") &&
          item.date >= weekStart &&
          item.date < weekEnd
        )
        .map(item => {
          const index = weekdayIndex(item.date);

          return {
            weekday: weekdayNames[index],
            clock: item.rawTime.includes(" ")
              ? item.rawTime.split(" ")[1]
              : "00:00",
            remaining: item.remaining,
            fullTime: item.rawTime
          };
        });

      const weekChart = new G2Plot.Line("week-chart", {
        data: weekData,
        xField: "clock",
        yField: "remaining",
        seriesField: "weekday",
        height: 360,
        color: weekdayColors,
        meta: {
          weekday: {
            values: weekdayNames
          }
        },
        point: {
          size: 5,
          shape: "circle"
        },
        smooth: false,
        legend: false,
        xAxis: {
          title: {
            text: "查询时间"
          }
        },
        yAxis: {
          title: {
            text: "剩余电量（度）"
          }
        },
        tooltip: {
          formatter: item => ({
            name: `${item.weekday} ${item.fullTime}`,
            value: `${item.remaining} 度`
          })
        }
      });

      weekChart.render();

      const recent = records.slice(-12).reverse();
      const body = document.getElementById("records-body");

      body.innerHTML = recent.map(item => {
        let usageText = "--";
        let stateText = "首次记录";

        if (item.usage !== null && item.usage < 0) {
          usageText = "--";
          stateText = "疑似充值";
        } else if (item.usage !== null) {
          usageText = `${item.usage} 度`;
          stateText = "正常";
        }

        return `
          <tr>
            <td>${item.rawTime}</td>
            <td>${item.remaining} 度</td>
            <td>${usageText}</td>
            <td>${stateText}</td>
          </tr>
        `;
      }).join("");
    }
  </script>
</body>
</html>
